apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: itomata-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: itomata-backend
  minReplicas: 1
  maxReplicas: 3 # IMPORTANT: reduce max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

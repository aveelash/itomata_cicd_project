apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: itomata-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    # This must match your CURRENT live version (v1 or v2)
    name: itomata-app-v1
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

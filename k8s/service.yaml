# 1. FRONTEND SERVICE (Points to Nginx on port 80)
apiVersion: v1
kind: Service
metadata:
  name: itomata-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: itomata
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# 2. BACKEND SERVICE (Points to Flask on port 5000)
apiVersion: v1
kind: Service
metadata:
  name: itomata-backend-service
spec:
  type: LoadBalancer
  selector:
    app: itomata
  ports:
    - protocol: TCP
      port: 80 # We use 80 here so the URL looks clean
      targetPort: 5000 # This is the magic: it directs traffic to your Flask app

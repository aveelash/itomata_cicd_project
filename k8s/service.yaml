# 1. FRONTEND SERVICE (The "Traffic Switch")
apiVersion: v1
kind: Service
metadata:
  name: itomata-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: itomata
    version: v1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: itomata-backend-service
spec:
  type: LoadBalancer
  selector:
    app: itomata
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000

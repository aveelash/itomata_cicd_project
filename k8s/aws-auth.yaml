apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system
data:
  mapRoles: |
    - rolearn: arn:aws:iam::795732143548:role/itomata_nodes-eks-node-group-20260226083801075700000003
      groups:
        - system:bootstrappers
        - system:nodes
      username: system:node:{{EC2PrivateDNSName}}
    - rolearn: arn:aws:iam::795732143548:role/itomata-v2-role-ap-south-1
      groups:
        - system:masters
      username: codebuild-admin

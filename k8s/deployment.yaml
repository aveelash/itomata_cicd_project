apiVersion: apps/v1
kind: Deployment
metadata:
  name: itomata-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: itomata
  template:
    metadata:
      labels:
        app: itomata
    spec:
      containers:
        - name: frontend
          image: 795732143548.dkr.ecr.us-east-1.amazonaws.com/itomata-frontend:latest
          ports:
            - containerPort: 80
        - name: backend
          image: 795732143548.dkr.ecr.us-east-1.amazonaws.com/itomata-backend:latest
          ports:
            - containerPort: 5000

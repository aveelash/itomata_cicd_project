apiVersion: apps/v1
kind: Deployment
metadata:
  # We use a placeholder so the script can name it 'itomata-app-v1' or 'v2'
  name: itomata-app-VERSION_PLACEHOLDER
spec:
  replicas: 2
  selector:
    matchLabels:
      app: itomata
      version: VERSION_PLACEHOLDER # New label
  template:
    metadata:
      labels:
        app: itomata
        version: VERSION_PLACEHOLDER # New label
    spec:
      containers:
        - name: frontend
          image: 795732143548.dkr.ecr.ap-south-1.amazonaws.com/itomata-frontend:latest
          ports:
            - containerPort: 80
        - name: backend
          image: 795732143548.dkr.ecr.ap-south-1.amazonaws.com/itomata-backend:latest
          ports:
            - containerPort: 5000

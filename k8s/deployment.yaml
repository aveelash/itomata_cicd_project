apiVersion: apps/v1
kind: Deployment
metadata:
  # The script will replace VERSION_PLACEHOLDER with v1 or v2
  name: itomata-app-VERSION_PLACEHOLDER
spec:
  replicas: 2
  selector:
    matchLabels:
      app: itomata
      version: VERSION_PLACEHOLDER
  template:
    metadata:
      labels:
        app: itomata
        version: VERSION_PLACEHOLDER
    spec:
      containers:
        - name: frontend
          image: 795732143548.dkr.ecr.ap-south-1.amazonaws.com/itomata-frontend:broken-v3
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: backend
          image: 795732143548.dkr.ecr.ap-south-1.amazonaws.com/itomata-backend:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

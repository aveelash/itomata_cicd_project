apiVersion: apps/v1
kind: Deployment
metadata:
  name: itomata-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: itomata-frontend
  template:
    metadata:
      labels:
        app: itomata-frontend
    spec:
      containers:
        - name: frontend
          image: 795732143548.dkr.ecr.ap-south-1.amazonaws.com/itomata-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

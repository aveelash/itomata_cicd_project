version: 0.2
phases:
  pre_build:
    commands:
      - echo "Checking directory structure..."
      - ls -R
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  build:
    commands:
      - echo "Building Docker images..."
      - docker build -t itomata-frontend frontend/
      - docker build -t itomata-backend backend/
  post_build:
    commands:
      - echo "Pushing images to ECR..."
      - docker tag itomata-frontend:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/itomata-frontend:latest
      - docker tag itomata-backend:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/itomata-backend:latest
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/itomata-frontend:latest
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/itomata-backend:latest
      - echo "Updating EKS deployment..."
      - aws eks update-kubeconfig --region ap-south-1 --name itomata-eks-cluster
      - echo "Applying application manifests..."
      # UPDATED: We target specific files to avoid the aws-auth conflict
      - aws sts get-caller-identity
      - kubectl apply -f k8s/deployment.yaml
      - kubectl apply -f k8s/service.yaml
      - kubectl rollout restart deployment itomata-app
      - echo "Deployment complete!"
